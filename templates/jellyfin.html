<!DOCTYPE html>
<html>
<head>
    <title>Jellyfin Registration</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --input-bg: #ffffff;
            --input-border: #cccccc;
            --button-bg: #00a4dc;
            --button-hover: #0082b0;
            --result-bg: #f5f5f5;
            --result-border: #dddddd;
            --note-blue-border: #00a4dc;        /* 原蓝色 */
            --note-blue-bg: rgba(0, 164, 220, 0.1);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #e0e0e0;
                --input-bg: #2d2d2d;
                --input-border: #404040;
                --button-bg: #0082b0;
                --button-hover: #00a4dc;
                --result-bg: #2d2d2d;
                --result-border: #404040;
                --note-blue-border: #4dc9ff;    /* 更明亮的科技蓝 */
                --note-blue-bg: rgba(77, 201, 255, 0.15);
            }
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        input[type="text"], select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
        }
        button {
            background-color: var(--button-bg);
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            border-radius: 4px;
        }
        button:hover {
            background-color: var(--button-hover);
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: var(--result-bg);
            border: 1px solid var(--result-border);
            white-space: pre-wrap;
            font-family: monospace;
        }
        .note {
            position: relative;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            border-left: 4px solid;
            border-radius: 4px;
            background: var(--note-blue-bg);
            color: var(--text-color);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            /* margin-bottom: 15px; */
        }
        #subtitle {
            margin-bottom: 0.5em;
        }
        .checkbox-option {
            display: flex;
            align-items: center;
            height: 1.5em;
        }
        .checkbox-option label {
            margin-left: 5px;
            display: inline;
        }
        .nested-option {
            margin-left: 25px;
            display: none;
        }        
        .new-user-input {
            margin-top: 10px;
            display: none;
        }
        #user_input {
            margin-top: 5px;
        }
        @media (max-width: 768px) {
            .note {
                padding: 1rem;
                margin: 1rem 0;
            }
            .note::before {
                left: -1.5em;
            }
        }
        @media (prefers-color-scheme: light) {
            .tslogo{
                height: 4em;
                width: 4em;
                background-image: url('/static/Tailscale-Mark-Black.svg');
                background-position: center;
                background-size: contain;
            }
        }
        @media (prefers-color-scheme: dark) {
            .tslogo{
                height: 4em;
                width: 4em;
                background-image: url('/static/Tailscale-Mark-White.svg');
                background-position: center;
                background-size: contain;
            }
        }
        .jflogo {
            height: 2.25em;
            width: 2.25em;
            background-image: url('/static/Jellyfin-icon.svg');
            background-position: center;
            background-size: contain;     
            margin-right: 1em;   
        }
        .titleBar {
            display: flex;
            flex-direction: row;
            width: 100%;
            flex-wrap: nowrap;
            justify-content: space-between;
            align-items: center;
        }
        .note.blue {
            border-color: var(--note-blue-border);
        }
    </style>
    <script>
        function toggleNsfwContinue() {
            var allowNsfw = document.getElementById('allow_nsfw');
            var nsfwContinue = document.getElementById('nsfw_continue_container');
            
            if (allowNsfw.checked) {
                nsfwContinue.style.display = 'flex';
            } else {
                nsfwContinue.style.display = 'none';
                document.getElementById('allow_nsfw_continue').checked = false;
            }
        }
        
        function validateForm() {
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            
            if (username === '') {
                alert('Please enter a username!');
                return false;
            }
            
            if (password === '') {
                alert('Please enter a password!');
                return false;
            }
            
            return true;
        }
    </script>
</head>
<body>
    <div class="titleBar">
        <h1>Jellyfin Registration</h1>
        <a href="../"><div class="jflogo"></div></a>
    </div>
    
    <div class="note blue">
        <p>⚠️ <strong>Important Notes:</strong></p>
        <p>To avoid social embarrassment, please exercise caution when enabling the "Show NSFW content on homepage" option!</p>
    </div>
    
    <form method="POST" action="/jellyfin/register" onsubmit="return validateForm()">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="text" id="password" name="password" required>
        </div>
        
        <div class="form-group">
            <div class="checkbox-group">
                <div class="checkbox-option">
                    <input type="checkbox" id="allow_nsfw" name="allow_nsfw" onchange="toggleNsfwContinue()">
                    <label for="allow_nsfw">Allow NSFW</label>
                </div>
                
                <div id="nsfw_continue_container" class="checkbox-option nested-option">
                    <input type="checkbox" id="allow_nsfw_continue" name="allow_nsfw_continue">
                    <label for="allow_nsfw_continue">Show NSFW content on Homepage</label>
                </div>
                
                <div class="checkbox-option">
                    <input type="checkbox" id="need_transcoding" name="need_transcoding">
                    <label for="need_transcoding">Need Transcoding</label>
                </div>
                
                <div class="checkbox-option">
                    <input type="checkbox" id="need_downloading" name="need_downloading">
                    <label for="need_downloading">Need Downloading</label>
                </div>
            </div>
        </div>
        
        <button type="submit">Register</button>
    </form>
    
    {% if result %}
    <div class="result"><h3 style="margin-block-start:0; font-size: 1.5em;">Result:</h3>{{ result }}</div>
    {% endif %}
</body>
</html>
